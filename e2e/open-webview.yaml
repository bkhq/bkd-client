appId: io.bk.bkd
name: Open WebView Flow
---
# Add a server first
- tapOn:
    id: add-server-button
- tapOn: 'https://'
- inputText: 'https://example.com'
- tapOn:
    id: submit-button

# Tap on the server to open WebView
- tapOn: 'https://example.com'

# WebView should load - verify toolbar buttons exist
- assertVisible:
    id: refresh-button
- assertVisible:
    id: menu-button

# Open dropdown menu
- tapOn:
    id: menu-button

# Go back to home
- tapOn: 返回首页

# Should be back on home screen
- assertVisible: 'https://example.com'

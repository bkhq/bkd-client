name: OTA Update

on:
  workflow_dispatch:
    inputs:
      message:
        description: "Update description"
        required: true
        type: string

jobs:
  publish:
    name: Publish OTA Update
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v5

      - uses: actions/setup-node@v5
        with:
          node-version: 22
          cache: npm

      - run: npm ci

      - name: Bump OTA version
        run: npm run version:ota

      - name: Export JS bundles
        run: |
          npx expo export --platform ios --output-dir dist-ios
          npx expo export --platform android --output-dir dist-android

          # Merge into single dist
          cp -r dist-ios dist
          cp -r dist-android/* dist/

          # Merge metadata.json (iOS + Android)
          python3 << 'PYEOF'
          import json
          with open('dist-ios/metadata.json') as f:
              ios = json.load(f)
          with open('dist-android/metadata.json') as f:
              android = json.load(f)
          merged = android.copy()
          merged['fileMetadata']['ios'] = ios['fileMetadata']['ios']
          with open('dist/metadata.json', 'w') as f:
              json.dump(merged, f)
          PYEOF

      - name: Upload to R2
        env:
          CLOUDFLARE_API_TOKEN: ${{ secrets.CLOUDFLARE_API_TOKEN }}
          CLOUDFLARE_ACCOUNT_ID: ${{ secrets.CLOUDFLARE_ACCOUNT_ID }}
        run: |
          npm install -g wrangler

          RUNTIME_VERSION=$(node -e "console.log(require('./version.json').runtimeVersion)")
          BUILD=$(node -e "console.log(require('./version.json').build)")
          TIMESTAMP=$(date +%s)
          UPDATE_PATH="updates/${RUNTIME_VERSION}/${TIMESTAMP}"

          echo "Publishing OTA update:"
          echo "  Runtime: ${RUNTIME_VERSION}, Build: ${BUILD}"
          echo "  Path: ${UPDATE_PATH}"
          echo "  Message: ${{ inputs.message }}"

          # Upload metadata.json
          wrangler r2 object put "bkd-releases/${UPDATE_PATH}/metadata.json" \
            --file dist/metadata.json --remote

          # Upload expoConfig.json if exists
          if [ -f dist/expoConfig.json ]; then
            wrangler r2 object put "bkd-releases/${UPDATE_PATH}/expoConfig.json" \
              --file dist/expoConfig.json --remote
          fi

          # Upload all files under _expo/ (bundles)
          find dist/_expo -type f | while read f; do
            rel=${f#dist/}
            wrangler r2 object put "bkd-releases/${UPDATE_PATH}/${rel}" \
              --file "$f" --remote
          done

          # Upload assets
          if [ -d dist/assets ]; then
            find dist/assets -type f | while read f; do
              rel=${f#dist/}
              wrangler r2 object put "bkd-releases/${UPDATE_PATH}/${rel}" \
                --file "$f" --remote
            done
          fi

          echo "OTA update published: ${UPDATE_PATH}"
          echo "  Files: $(find dist -type f | wc -l)"

      - name: Commit version bump
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add version.json app.json package.json
          git commit -m "chore: ota update build $(node -e "console.log(require('./version.json').build)") - ${{ inputs.message }}"
          git push

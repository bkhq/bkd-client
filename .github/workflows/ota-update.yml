name: OTA Update

on:
  workflow_dispatch:
    inputs:
      message:
        description: "Update message"
        required: true
        type: string

jobs:
  publish:
    name: Publish OTA Update
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v5

      - uses: actions/setup-node@v5
        with:
          node-version: 22
          cache: npm

      - run: npm ci

      - name: Export JS bundle
        run: npx expo export --output-dir dist

      - name: Upload to R2
        env:
          CLOUDFLARE_API_TOKEN: ${{ secrets.CLOUDFLARE_API_TOKEN }}
          CLOUDFLARE_ACCOUNT_ID: ${{ secrets.CLOUDFLARE_ACCOUNT_ID }}
        run: |
          npm install -g wrangler

          # Read runtime version from app.json
          RUNTIME_VERSION=$(node -e "console.log(require('./app.json').expo.runtimeVersion)")
          TIMESTAMP=$(date +%s)
          UPDATE_PATH="updates/${RUNTIME_VERSION}/${TIMESTAMP}"

          echo "Publishing OTA update:"
          echo "  Runtime version: ${RUNTIME_VERSION}"
          echo "  Update ID: ${TIMESTAMP}"
          echo "  Message: ${{ inputs.message }}"

          # Upload metadata.json
          wrangler r2 object put "bkd-releases/${UPDATE_PATH}/metadata.json" \
            --file dist/metadata.json --remote

          # Upload expoConfig.json
          wrangler r2 object put "bkd-releases/${UPDATE_PATH}/expoConfig.json" \
            --file dist/expoConfig.json --remote

          # Upload bundles
          for f in dist/bundles/*; do
            name=$(basename "$f")
            wrangler r2 object put "bkd-releases/${UPDATE_PATH}/bundles/${name}" \
              --file "$f" --remote
          done

          # Upload assets
          if [ -d dist/assets ]; then
            for f in dist/assets/*; do
              name=$(basename "$f")
              wrangler r2 object put "bkd-releases/${UPDATE_PATH}/assets/${name}" \
                --file "$f" --remote
            done
          fi

          echo "OTA update published: ${UPDATE_PATH}"

name: Release

on:
  push:
    tags: ['v*']
  workflow_dispatch:
    inputs:
      version:
        description: Version (e.g. 1.0.0)
        required: true
      platforms:
        description: Platforms to build
        required: true
        default: all
        type: choice
        options:
          - all
          - android
          - ios

env:
  NODE_VERSION: '20'

jobs:
  quality:
    name: Quality Gate
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v5
      - uses: actions/setup-node@v5
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: npm
      - run: npm ci
      - name: TypeScript check
        run: npm run typecheck
      - name: Lint
        run: npm run lint
      - name: Unit tests
        run: npm test -- --coverage --ci

  build-android:
    name: Build Android APK
    needs: quality
    runs-on: ubuntu-latest
    if: >
      github.event_name == 'push' ||
      github.event.inputs.platforms == 'all' ||
      github.event.inputs.platforms == 'android'
    steps:
      - uses: actions/checkout@v5

      - uses: actions/setup-node@v5
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: npm

      - uses: actions/setup-java@v5
        with:
          distribution: temurin
          java-version: 17

      - run: npm ci

      # Cache Gradle dependencies and build outputs
      - uses: actions/cache@v5
        with:
          path: |
            ~/.gradle/caches
            ~/.gradle/wrapper
          key: gradle-${{ runner.os }}-${{ hashFiles('android/gradle/wrapper/gradle-wrapper.properties', 'android/app/build.gradle') }}
          restore-keys: gradle-${{ runner.os }}-

      # Generate native Android project
      - name: Expo prebuild
        run: npx expo prebuild --platform android --clean

      # Decode keystore from secret
      - name: Setup keystore
        env:
          KEYSTORE_BASE64: ${{ secrets.ANDROID_KEYSTORE_BASE64 }}
          KEYSTORE_PASSWORD: ${{ secrets.ANDROID_KEYSTORE_PASSWORD }}
          KEY_ALIAS: ${{ secrets.ANDROID_KEY_ALIAS }}
          KEY_PASSWORD: ${{ secrets.ANDROID_KEY_PASSWORD }}
        run: |
          if [ -n "$KEYSTORE_BASE64" ]; then
            echo "$KEYSTORE_BASE64" | base64 -d > android/app/release.keystore
            cat >> android/gradle.properties <<PROPS
          RELEASE_STORE_FILE=release.keystore
          RELEASE_STORE_PASSWORD=$KEYSTORE_PASSWORD
          RELEASE_KEY_ALIAS=$KEY_ALIAS
          RELEASE_KEY_PASSWORD=$KEY_PASSWORD
          PROPS
          fi

      # Build APK
      - name: Build APK
        working-directory: android
        run: |
          if [ -f app/release.keystore ]; then
            ./gradlew assembleRelease
          else
            ./gradlew assembleDebug
          fi

      # Find and rename APK
      - name: Prepare artifact
        run: |
          APK=$(find android/app/build/outputs/apk -name "*.apk" | head -1)
          if [ "${{ github.event_name }}" = "push" ]; then
            VERSION="${GITHUB_REF_NAME#v}"
          else
            VERSION="${{ github.event.inputs.version }}"
          fi
          mkdir -p artifacts
          cp "$APK" "artifacts/bkd-v${VERSION}.apk"
          echo "VERSION=${VERSION}" >> "$GITHUB_ENV"

      - uses: actions/upload-artifact@v5
        with:
          name: android-apk
          path: artifacts/*.apk

  build-ios:
    name: Build iOS IPA
    needs: quality
    runs-on: macos-15
    if: >
      github.event_name == 'push' ||
      github.event.inputs.platforms == 'all' ||
      github.event.inputs.platforms == 'ios'
    steps:
      - uses: actions/checkout@v5

      - uses: actions/setup-node@v5
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: npm

      - run: npm ci

      # Generate native iOS project
      - name: Expo prebuild
        run: npx expo prebuild --platform ios --clean --no-install

      # Patch Podfile: fix expo-modules-core Swift 6 compatibility (ref: tamagui)
      - name: Patch Podfile for Swift 6 compatibility
        run: |
          cd ios
          python3 << 'PYEOF'
          with open('Podfile', 'r') as f:
              content = f.read()
          # Target ExpoModulesCore specifically: Swift 6 + minimal concurrency + IsolatedConformances
          patch = '''    installer.pods_project.targets.each do |target|
                if ['ExpoModulesCore', 'expo-modules-core'].include?(target.name)
                  target.build_configurations.each do |bc|
                    bc.build_settings["SWIFT_VERSION"] = "6"
                    bc.build_settings["SWIFT_STRICT_CONCURRENCY"] = "minimal"
                    bc.build_settings["SWIFT_COMPILATION_MODE"] = "singlefile"
                    flags = bc.build_settings["OTHER_SWIFT_FLAGS"] || "$(inherited)"
                    unless flags.include?("IsolatedConformances")
                      bc.build_settings["OTHER_SWIFT_FLAGS"] = "#{flags} -enable-upcoming-feature IsolatedConformances"
                    end
                  end
                else
                  target.build_configurations.each do |bc|
                    bc.build_settings["SWIFT_STRICT_CONCURRENCY"] = "minimal"
                  end
                end
              end
          '''
          content = content.replace(
              'react_native_post_install(',
              patch + '    react_native_post_install('
          )
          with open('Podfile', 'w') as f:
              f.write(content)
          PYEOF
          echo "=== Patched Podfile ==="
          grep -A 20 "post_install" Podfile

      # Cache CocoaPods
      - uses: actions/cache@v5
        with:
          path: ios/Pods
          key: pods-${{ runner.os }}-${{ hashFiles('ios/Podfile.lock') }}
          restore-keys: pods-${{ runner.os }}-

      - name: Install CocoaPods
        run: cd ios && pod install --repo-update

      # Import signing certificate
      - name: Install Apple certificate
        env:
          P12_BASE64: ${{ secrets.P12_BASE64 }}
          P12_PASSWORD: ${{ secrets.P12_PASSWORD }}
          KEYCHAIN_PASSWORD: ${{ github.run_id }}
        run: |
          CERTIFICATE_PATH=$RUNNER_TEMP/certificate.p12
          KEYCHAIN_PATH=$RUNNER_TEMP/app-signing.keychain-db

          echo -n "$P12_BASE64" | base64 --decode -o $CERTIFICATE_PATH

          security create-keychain -p "$KEYCHAIN_PASSWORD" $KEYCHAIN_PATH
          security set-keychain-settings -lut 21600 $KEYCHAIN_PATH
          security unlock-keychain -p "$KEYCHAIN_PASSWORD" $KEYCHAIN_PATH
          security import $CERTIFICATE_PATH -P "$P12_PASSWORD" -A -t cert -f pkcs12 -k $KEYCHAIN_PATH
          security set-key-partition-list -S apple-tool:,apple: -k "$KEYCHAIN_PASSWORD" $KEYCHAIN_PATH
          security list-keychain -d user -s $KEYCHAIN_PATH

      # Install provisioning profile
      - name: Install provisioning profile
        env:
          PROVISIONING_PROFILE_BASE64: ${{ secrets.PROVISIONING_PROFILE_BASE64 }}
        run: |
          PP_PATH=$RUNNER_TEMP/profile.mobileprovision
          echo -n "$PROVISIONING_PROFILE_BASE64" | base64 --decode -o $PP_PATH
          mkdir -p ~/Library/MobileDevice/Provisioning\ Profiles
          # Extract UUID from profile and use it as filename
          PP_UUID=$(/usr/libexec/PlistBuddy -c "Print UUID" /dev/stdin <<< $(security cms -D -i $PP_PATH))
          cp $PP_PATH ~/Library/MobileDevice/Provisioning\ Profiles/${PP_UUID}.mobileprovision
          echo "PP_UUID=${PP_UUID}" >> "$GITHUB_ENV"

      # Archive
      - name: Xcode archive
        run: |
          cd ios
          xcodebuild \
            -workspace BKD.xcworkspace \
            -scheme BKD \
            -sdk iphoneos \
            -configuration Release \
            -archivePath $RUNNER_TEMP/bkd.xcarchive \
            DEVELOPMENT_TEAM=${{ secrets.APPLE_TEAM_ID }} \
            CODE_SIGN_STYLE=Manual \
            CODE_SIGN_IDENTITY="Apple Distribution" \
            PROVISIONING_PROFILE_SPECIFIER="${PP_UUID}" \
            archive

      # Export IPA (ad-hoc for direct download)
      - name: Export IPA
        run: |
          cat > $RUNNER_TEMP/ExportOptions.plist << 'PLIST'
          <?xml version="1.0" encoding="UTF-8"?>
          <!DOCTYPE plist PUBLIC "-//Apple//DTD PLIST 1.0//EN" "http://www.apple.com/DTDs/PropertyList-1.0.dtd">
          <plist version="1.0">
          <dict>
            <key>method</key>
            <string>ad-hoc</string>
            <key>teamID</key>
            <string>${{ secrets.APPLE_TEAM_ID }}</string>
          </dict>
          </plist>
          PLIST

          xcodebuild -exportArchive \
            -archivePath $RUNNER_TEMP/bkd.xcarchive \
            -exportOptionsPlist $RUNNER_TEMP/ExportOptions.plist \
            -exportPath $RUNNER_TEMP/export

      # Prepare artifact
      - name: Prepare artifact
        run: |
          if [ "${{ github.event_name }}" = "push" ]; then
            VERSION="${GITHUB_REF_NAME#v}"
          else
            VERSION="${{ github.event.inputs.version }}"
          fi
          mkdir -p artifacts
          cp $RUNNER_TEMP/export/*.ipa "artifacts/bkd-v${VERSION}.ipa"
          echo "VERSION=${VERSION}" >> "$GITHUB_ENV"

      - uses: actions/upload-artifact@v5
        with:
          name: ios-ipa
          path: artifacts/*.ipa

      # Cleanup
      - name: Cleanup keychain
        if: always()
        run: security delete-keychain $RUNNER_TEMP/app-signing.keychain-db 2>/dev/null || true

  upload-to-r2:
    name: Upload to R2
    needs: [build-android, build-ios]
    if: always() && (needs.build-android.result == 'success' || needs.build-ios.result == 'success')
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v5

      - uses: actions/download-artifact@v5
        with:
          path: artifacts

      - uses: actions/setup-node@v5
        with:
          node-version: ${{ env.NODE_VERSION }}

      - run: npm install -g wrangler

      - name: Determine version
        run: |
          if [ "${{ github.event_name }}" = "push" ]; then
            VERSION="${GITHUB_REF_NAME#v}"
          else
            VERSION="${{ github.event.inputs.version }}"
          fi
          echo "VERSION=${VERSION}" >> "$GITHUB_ENV"

      - name: List artifacts
        run: find artifacts -type f

      # Upload APK to R2
      - name: Upload APK
        if: needs.build-android.result == 'success'
        env:
          CLOUDFLARE_API_TOKEN: ${{ secrets.CLOUDFLARE_API_TOKEN }}
          CLOUDFLARE_ACCOUNT_ID: ${{ secrets.CLOUDFLARE_ACCOUNT_ID }}
        run: |
          APK=$(find artifacts -name "*.apk" | head -1)
          wrangler r2 object put \
            "bkd-releases/android/bkd-v${VERSION}.apk" \
            --file "$APK" --remote

      # Upload IPA to R2
      - name: Upload IPA
        if: needs.build-ios.result == 'success'
        env:
          CLOUDFLARE_API_TOKEN: ${{ secrets.CLOUDFLARE_API_TOKEN }}
          CLOUDFLARE_ACCOUNT_ID: ${{ secrets.CLOUDFLARE_ACCOUNT_ID }}
        run: |
          IPA=$(find artifacts -name "*.ipa" | head -1)
          wrangler r2 object put \
            "bkd-releases/ios/bkd-v${VERSION}.ipa" \
            --file "$IPA" --remote

      # Update latest.json manifest
      - name: Update latest.json
        env:
          CLOUDFLARE_API_TOKEN: ${{ secrets.CLOUDFLARE_API_TOKEN }}
          CLOUDFLARE_ACCOUNT_ID: ${{ secrets.CLOUDFLARE_ACCOUNT_ID }}
        run: |
          DATE=$(date -u +%Y-%m-%d)
          ANDROID_URL=""
          IOS_URL=""
          if [ "${{ needs.build-android.result }}" = "success" ]; then
            ANDROID_URL="android/bkd-v${VERSION}.apk"
          fi
          if [ "${{ needs.build-ios.result }}" = "success" ]; then
            IOS_URL="ios/bkd-v${VERSION}.ipa"
          fi

          cat > /tmp/latest.json << MANIFEST
          {
            "version": "${VERSION}",
            "date": "${DATE}",
            "android_url": "${ANDROID_URL}",
            "ios_url": "${IOS_URL}"
          }
          MANIFEST

          wrangler r2 object put \
            "bkd-releases/latest.json" \
            --file /tmp/latest.json \
            --content-type "application/json" --remote

  deploy-website:
    name: Deploy Website
    needs: upload-to-r2
    if: always() && needs.upload-to-r2.result == 'success'
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v5

      - uses: actions/setup-node@v5
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: npm
          cache-dependency-path: website/package.json

      - run: cd website && npm ci

      - name: Deploy to Cloudflare Workers
        env:
          CLOUDFLARE_API_TOKEN: ${{ secrets.CLOUDFLARE_API_TOKEN }}
          CLOUDFLARE_ACCOUNT_ID: ${{ secrets.CLOUDFLARE_ACCOUNT_ID }}
        run: cd website && npx wrangler deploy --env production

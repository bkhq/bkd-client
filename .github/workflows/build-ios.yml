name: Build iOS (Xcode)

on:
  workflow_dispatch:
    inputs:
      configuration:
        description: Build configuration
        required: true
        default: Release
        type: choice
        options:
          - Debug
          - Release
      sign:
        description: Code sign (requires secrets)
        required: true
        default: false
        type: boolean

jobs:
  build-ios:
    name: Xcode Build
    runs-on: macos-15
    env:
      EXPO_TOKEN: ${{ secrets.EXPO_TOKEN }}
    steps:
      - uses: actions/checkout@v5

      - uses: actions/setup-node@v5
        with:
          node-version: 20
          cache: npm

      - run: npm ci

      # Generate native iOS project
      - name: Prebuild iOS
        run: npx expo prebuild --platform ios --clean --no-install

      # Install CocoaPods
      - name: Install CocoaPods
        run: |
          cd ios
          pod install --repo-update

      # Import signing certificate (only when sign=true)
      - name: Install Apple certificate
        if: inputs.sign
        env:
          P12_BASE64: ${{ secrets.P12_BASE64 }}
          P12_PASSWORD: ${{ secrets.P12_PASSWORD }}
          KEYCHAIN_PASSWORD: ${{ github.run_id }}
        run: |
          CERTIFICATE_PATH=$RUNNER_TEMP/certificate.p12
          KEYCHAIN_PATH=$RUNNER_TEMP/app-signing.keychain-db

          echo -n "$P12_BASE64" | base64 --decode -o $CERTIFICATE_PATH

          security create-keychain -p "$KEYCHAIN_PASSWORD" $KEYCHAIN_PATH
          security set-keychain-settings -lut 21600 $KEYCHAIN_PATH
          security unlock-keychain -p "$KEYCHAIN_PASSWORD" $KEYCHAIN_PATH
          security import $CERTIFICATE_PATH -P "$P12_PASSWORD" -A -t cert -f pkcs12 -k $KEYCHAIN_PATH
          security set-key-partition-list -S apple-tool:,apple: -k "$KEYCHAIN_PASSWORD" $KEYCHAIN_PATH
          security list-keychain -d user -s $KEYCHAIN_PATH

      # Install provisioning profile (only when sign=true)
      - name: Install provisioning profile
        if: inputs.sign
        env:
          PROVISIONING_PROFILE_BASE64: ${{ secrets.PROVISIONING_PROFILE_BASE64 }}
        run: |
          PP_PATH=$RUNNER_TEMP/profile.mobileprovision
          echo -n "$PROVISIONING_PROFILE_BASE64" | base64 --decode -o $PP_PATH
          mkdir -p ~/Library/MobileDevice/Provisioning\ Profiles
          PP_UUID=$(/usr/libexec/PlistBuddy -c "Print UUID" /dev/stdin <<< $(security cms -D -i $PP_PATH))
          cp $PP_PATH ~/Library/MobileDevice/Provisioning\ Profiles/${PP_UUID}.mobileprovision
          echo "PP_UUID=${PP_UUID}" >> "$GITHUB_ENV"

      # Build — signed archive or unsigned simulator
      - name: Build with Xcode
        run: |
          cd ios
          if [ "${{ inputs.sign }}" = "true" ]; then
            xcodebuild \
              -workspace BKD.xcworkspace \
              -scheme BKD \
              -sdk iphoneos \
              -configuration ${{ inputs.configuration }} \
              -archivePath $RUNNER_TEMP/bkd.xcarchive \
              DEVELOPMENT_TEAM=${{ secrets.APPLE_TEAM_ID }} \
              CODE_SIGN_STYLE=Manual \
              CODE_SIGN_IDENTITY="Apple Distribution" \
              PROVISIONING_PROFILE_SPECIFIER="${PP_UUID}" \
              SWIFT_STRICT_CONCURRENCY=minimal \
              archive
          else
            xcodebuild \
              -workspace BKD.xcworkspace \
              -scheme BKD \
              -sdk iphonesimulator \
              -configuration ${{ inputs.configuration }} \
              -destination 'generic/platform=iOS Simulator' \
              CODE_SIGN_IDENTITY="" \
              SWIFT_STRICT_CONCURRENCY=minimal \
              CODE_SIGNING_REQUIRED=NO \
              CODE_SIGNING_ALLOWED=NO
          fi

      # Export IPA (signed builds only)
      - name: Export IPA
        if: inputs.sign
        run: |
          cat > $RUNNER_TEMP/ExportOptions.plist << 'PLIST'
          <?xml version="1.0" encoding="UTF-8"?>
          <!DOCTYPE plist PUBLIC "-//Apple//DTD PLIST 1.0//EN" "http://www.apple.com/DTDs/PropertyList-1.0.dtd">
          <plist version="1.0">
          <dict>
            <key>method</key>
            <string>development</string>
            <key>teamID</key>
            <string>${{ secrets.APPLE_TEAM_ID }}</string>
          </dict>
          </plist>
          PLIST

          xcodebuild -exportArchive \
            -archivePath $RUNNER_TEMP/bkd.xcarchive \
            -exportOptionsPlist $RUNNER_TEMP/ExportOptions.plist \
            -exportPath $RUNNER_TEMP/export

      # Upload IPA
      - name: Upload IPA
        if: inputs.sign
        uses: actions/upload-artifact@v5
        with:
          name: bkd-ios-${{ inputs.configuration }}
          path: ${{ runner.temp }}/export/*.ipa

      # Cleanup
      - name: Cleanup keychain
        if: always() && inputs.sign
        run: |
          security delete-keychain $RUNNER_TEMP/app-signing.keychain-db 2>/dev/null || true
